# Vibecrafted install manifest — consumed by the built-in vetcoders-installer
# under scripts/installer/.
#
#   make vibecrafted                      (terminal wizard, the default)
#   make wizard                           (browser-based GUI, optional)
#   uv run --project scripts/installer vetcoders-installer install.toml --dry-run
#
# Steps follow the checklist defined in docs/installer/2_listing.zsh.md:
#   1. Diagnostics              (read-only environment scan)
#   2. Installation             (install missing deps + foundations)
#   3. Post-installation setup  (workspace dirs, symlinks, helpers)
#   4. Verification & tour      (read-only doctor pass + next steps)

title = "⚒ Vibecrafted."
version_file = "VERSION"
log = "~/.vibecrafted/logs/installer/install-{ts}.log"

# Keep the installer tool around: vibecrafted ships `vibecrafted update`
# which re-runs this manifest, so the tool stays useful post-bootstrap.
persist = true


[[phase]]
key = "diagnostics"
label = "Diagnostics"
reason = """
We will check your environment for:
  • any existing framework installation
    foundations · workflows · helpers · binaries
  • toolchains
    node · python · rust
  • agents
    claude-code · codex · gemini-cli
  • additional tools
    zellij · mise · starship · atuin · zoxide

Read-only. We touch nothing on your system during this step.
"""
cmd = [
    "python3",
    "scripts/vetcoders_install.py",
    "list",
    "--source", ".",
]
optional = true


[[phase]]
key = "installation"
label = "Installation"
reason = """
We will install:
  • missing dependencies
  • workflows (9 basic, 7 advanced)
  • helpers and binaries (executables and functions)

Writes foundation binaries (loctree-mcp, aicx-mcp, zellij) and agent
CLIs (claude, codex, gemini) under ~/.vibecrafted/bin and ~/.cargo/bin.
Your system PATH is not modified.
"""
cmd = ["bash", "scripts/install-foundations.sh"]


[[phase]]
key = "post-install"
label = "Post-installation setup"
reason = """
We will configure:
  • workspace directories under $VIBECRAFTED_ROOT/.vibecrafted/
  • symlinks for AI coding agents under ~/.agents/
  • the 16 vc-* workflow skills synced into ~/.vibecrafted/skills
  • the shell helper layer at ~/.config/vetcoders/vc-skills.sh

Writes the install manifest at ~/.vibecrafted/skills/.vc-install.json
so `vibecrafted update` can re-run this flow cleanly.
"""
cmd = [
    "python3",
    "scripts/vetcoders_install.py",
    "install",
    "--source", ".",
    "--with-shell",
    "--compact",
    "--non-interactive",
]


[[phase]]
key = "verification"
label = "Verification and quick tour"
reason = """
Read-only. We run `vibecrafted doctor` to check every installed
component — skills, symlinks, foundation binaries, agent CLIs, helper
shims, and launcher wrappers — then print the quick tour of the
framework's most useful commands.
"""
cmd = [
    "python3",
    "scripts/vetcoders_install.py",
    "doctor",
]
optional = true
