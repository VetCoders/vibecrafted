[tools]
python = "3.12"
node = "lts"

[env]
VIBECRAFTED_HOME = "{{env.HOME}}/.vibecrafted"

[tasks.install]
description = "Run VibeCraft interactive installer"
run = "python3 \"$MISE_PROJECT_ROOT/scripts/setup_vibecraft.py\""

[tasks.skills]
description = "Install skills only"
run = "python3 \"$MISE_PROJECT_ROOT/scripts/vetcoders_install.py\" install --source \"$MISE_PROJECT_ROOT\""

[tasks.doctor]
description = "Run VibeCraft health check"
run = "python3 \"$MISE_PROJECT_ROOT/scripts/vetcoders_install.py\" doctor"

[tasks.list]
description = "List bundle contents and runtime foundations"
run = "python3 \"$MISE_PROJECT_ROOT/scripts/vetcoders_install.py\" list --source \"$MISE_PROJECT_ROOT\""

[tasks.helpers]
description = "Install only the optional zsh helper layer"
run = "bash \"$MISE_PROJECT_ROOT/skills/vc-agents/scripts/install-shell.sh\" --source \"$MISE_PROJECT_ROOT\""

[tasks.frontier-config]
description = "Install repo-owned Starship, Atuin, and Zellij presets"
run = "bash \"$MISE_PROJECT_ROOT/skills/vc-agents/scripts/install-frontier-config.sh\" --source \"$MISE_PROJECT_ROOT\""

[tasks.frontier-config-dry-run]
description = "Preview frontier config installation"
run = "bash \"$MISE_PROJECT_ROOT/skills/vc-agents/scripts/install-frontier-config.sh\" --source \"$MISE_PROJECT_ROOT\" --dry-run"
