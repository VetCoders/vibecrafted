name: Portable Checks

on:
  push:
  pull_request:

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Run shell checks
        run: make check
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Run installer tests
        run: make test
      - name: Check marketplace bundle drift
        run: make bundle-check
      - name: Install rsync on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y rsync
      - name: Run portable checks
        run: bash scripts/check-portable.sh

  curl-bootstrap:
    name: curl | bash bootstrap
    needs: portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serve install.sh locally and bootstrap
        run: |
          # Create a local archive from the checked-out source
          archive="/tmp/vibecrafted-bootstrap.tar.gz"
          tar -czf "$archive" --exclude='.git' -C "$GITHUB_WORKSPACE" .
          bash install.sh --archive-file "$archive"
      - name: Verify bootstrap result
        run: |
          test -L "$HOME/.vibecrafted/tools/vibecrafted-current"
          test -f "$HOME/.vibecrafted/skills/vc-agents/scripts/codex_spawn.sh"
          test -f "$HOME/.config/vetcoders/vc-skills.sh"
          echo "Bootstrap OK"
