name: Portable Checks

on:
  push:
  pull_request:
  merge_group:

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os: macOS
          - runner: ubuntu-latest
            os: Linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck on Linux
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Install shellcheck on macOS
        if: matrix.os == 'macOS'
        run: brew install shellcheck
      - name: Run shell checks
        run: make check
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run installer tests
        run: make test
      - name: Build marketplace bundle
        run: make bundle
      - name: Install rsync on Linux
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get install -y rsync
      - name: Run portable checks
        run: bash scripts/check-portable.sh

  curl-bootstrap:
    name: curl | bash bootstrap
    if: github.event_name == 'merge_group'
    needs: portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serve install.sh locally and bootstrap
        run: |
          archive="/tmp/vibecrafted-bootstrap.tar.gz"
          tar -czf "$archive" --exclude='.git' -C "$GITHUB_WORKSPACE" .
          bash install.sh --archive-file "$archive"
      - name: Verify bootstrap result
        run: |
          vibecrafted_home="${VIBECRAFTED_HOME:-$HOME/.vibecrafted}"
          test -L "$vibecrafted_home/tools/vibecrafted-current"
          test -f "$vibecrafted_home/tools/vibecrafted-current/skills/vc-agents/scripts/codex_spawn.sh"
          test -f "$HOME/.config/vetcoders/vc-skills.sh"
          echo "Bootstrap OK"
