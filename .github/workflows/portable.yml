name: Portable Checks

on:
  push:
  pull_request:

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: dragon-macos
            os: macOS
          - runner: ops-linux
            os: Linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck on Linux
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shell checks
        run: make check
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run installer tests
        run: make test
      - name: Build marketplace bundle
        run: make bundle
      - name: Check marketplace bundle drift
        run: make bundle-check
      - name: Install rsync on Linux
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get install -y rsync
      - name: Run portable checks
        run: bash scripts/check-portable.sh
      - name: Run tests
        run: make test

  curl-bootstrap:
    name: curl | bash bootstrap
    needs: portable
    runs-on: ops-linux
    steps:
      - uses: actions/checkout@v4
      - name: Serve install.sh locally and bootstrap
        run: |
          archive="/tmp/vibecrafted-bootstrap.tar.gz"
          tar -czf "$archive" --exclude='.git' -C "$GITHUB_WORKSPACE" .
          bash install.sh --archive-file "$archive"
      - name: Verify bootstrap result
        run: |
          test -L "$VIBECRAFTED_ROOT/.vibecrafted/tools/vibecrafted-current"
          test -f "$VIBECRAFTED_ROOT/.vibecrafted/skills/vc-agents/scripts/codex_spawn.sh"
          test -f "$HOME/.config/vetcoders/vc-skills.sh"
          echo "Bootstrap OK"
