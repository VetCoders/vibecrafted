name: Portable Checks

on:
  push:
  pull_request:

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install rsync on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync
      - name: Run portable checks
        run: bash scripts/check-portable.sh
